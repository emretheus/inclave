<svg width="100%" viewBox="0 0 680 680" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- LEFT COLUMN: main flow -->
  <!-- 1. INPUT -->
  <rect x="60" y="30" width="160" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" x="140" y="52" text-anchor="middle" dominant-baseline="central" fill="#085041">User input</text>
  <text font-size="12" x="140" y="70" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">CSV file + prompt</text>

  <line x1="140" y1="86" x2="140" y2="116" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 2. FASTAPI -->
  <rect x="60" y="116" width="160" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" x="140" y="138" text-anchor="middle" dominant-baseline="central" fill="#3C3489">FastAPI server</text>
  <text font-size="12" x="140" y="156" text-anchor="middle" dominant-baseline="central" fill="#534AB7">/generate endpoint</text>

  <line x1="140" y1="172" x2="140" y2="202" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 3. PIPELINE -->
  <rect x="60" y="202" width="160" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" x="140" y="224" text-anchor="middle" dominant-baseline="central" fill="#3C3489">Code pipeline</text>
  <text font-size="12" x="140" y="242" text-anchor="middle" dominant-baseline="central" fill="#534AB7">Main orchestrator</text>

  <line x1="140" y1="258" x2="140" y2="288" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 4. OLLAMA -->
  <rect x="60" y="288" width="160" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" x="140" y="310" text-anchor="middle" dominant-baseline="central" fill="#0C447C">Ollama client</text>
  <text font-size="12" x="140" y="328" text-anchor="middle" dominant-baseline="central" fill="#185FA5">qwen2.5-coder:7b</text>

  <line x1="140" y1="344" x2="140" y2="374" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 5. CODE VALIDATOR -->
  <rect x="60" y="374" width="160" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" x="140" y="396" text-anchor="middle" dominant-baseline="central" fill="#0C447C">Code validator</text>
  <text font-size="12" x="140" y="414" text-anchor="middle" dominant-baseline="central" fill="#185FA5">Auto-fixes imports</text>

  <line x1="140" y1="430" x2="140" y2="460" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 6. OUTPUT -->
  <rect x="60" y="460" width="160" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" x="140" y="486" text-anchor="middle" dominant-baseline="central" fill="#085041">Python code output</text>

  <!-- RIGHT COLUMN: supporting components -->

  <!-- SCHEMA ANALYZER -->
  <rect x="310" y="202" width="170" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" x="395" y="224" text-anchor="middle" dominant-baseline="central" fill="#712B13">Schema analyzer</text>
  <text font-size="12" x="395" y="242" text-anchor="middle" dominant-baseline="central" fill="#993C1D">Types, nulls, duplicates</text>

  <!-- RAG RETRIEVER -->
  <rect x="310" y="288" width="170" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" x="395" y="310" text-anchor="middle" dominant-baseline="central" fill="#712B13">RAG retriever</text>
  <text font-size="12" x="395" y="328" text-anchor="middle" dominant-baseline="central" fill="#993C1D">Finds pandas patterns</text>

  <!-- EMBEDDING MODEL -->
  <rect x="510" y="202" width="140" height="56" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" x="580" y="224" text-anchor="middle" dominant-baseline="central" fill="#633806">Embedding model</text>
  <text font-size="12" x="580" y="242" text-anchor="middle" dominant-baseline="central" fill="#854F0B">nomic-embed-text</text>

  <!-- CHROMADB -->
  <rect x="510" y="288" width="140" height="56" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" x="580" y="310" text-anchor="middle" dominant-baseline="central" fill="#633806">ChromaDB</text>
  <text font-size="12" x="580" y="328" text-anchor="middle" dominant-baseline="central" fill="#854F0B">Vector store</text>

  <!-- KNOWLEDGE BASE -->
  <rect x="510" y="374" width="140" height="56" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" x="580" y="396" text-anchor="middle" dominant-baseline="central" fill="#633806">Knowledge base</text>
  <text font-size="12" x="580" y="414" text-anchor="middle" dominant-baseline="central" fill="#854F0B">pandas patterns</text>

  <!-- ARROWS right column -->
  <line x1="220" y1="225" x2="308" y2="225" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="220" y1="245" x2="308" y2="310" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="480" y1="316" x2="508" y2="316" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="580" y1="258" x2="580" y2="286" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="580" y1="374" x2="580" y2="346" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- LEGEND -->
  <rect x="60" y="530" width="590" height="110" rx="8" fill="none" stroke="#888780" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" x="355" y="552" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">Legend</text>

  <rect x="80" y="568" width="12" height="12" rx="2" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text font-size="12" x="100" y="579" fill="#444441">Input / Output</text>

  <rect x="80" y="596" width="12" height="12" rx="2" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text font-size="12" x="100" y="607" fill="#444441">Orchestration</text>

  <rect x="230" y="568" width="12" height="12" rx="2" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text font-size="12" x="250" y="579" fill="#444441">Analysis / RAG</text>

  <rect x="230" y="596" width="12" height="12" rx="2" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text font-size="12" x="250" y="607" fill="#444441">LLM layer</text>

  <rect x="400" y="568" width="12" height="12" rx="2" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text font-size="12" x="420" y="579" fill="#444441">Storage</text>

</svg>