[project]
name = "enclave-sandbox"
version = "0.0.0"
description = "macOS Seatbelt-based isolated code execution for enclave-code"
requires-python = ">=3.12"
dependencies = [
    "enclave-core",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/enclave_sandbox"]
