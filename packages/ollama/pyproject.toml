[project]
name = "enclave-ollama"
version = "0.1.0"
description = "Local LLM inference and model management via Ollama"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "enclave-core",
    "ollama>=0.2.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-cov>=5.0.0",
    "respx>=0.21.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/enclave_ollama"]

[tool.mypy]
packages = ["enclave_ollama"]
mypy_path = "src"

[[tool.mypy.overrides]]
module = "enclave_core.*"
ignore_missing_imports = true
