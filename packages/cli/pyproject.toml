[project]
name = "inclave-cli"
version = "0.1.0"
description = "InClave CLI — entrypoint, REPL, file ingestion, command routing"
readme = "README.md"
license = { text = "Apache-2.0" }
authors = [
    { name = "Emre Ulgac", email = "ulgacemre@gmail.com" },
    { name = "Emre Kocyigit", email = "kocyigit.emre.30@gmail.com" },
    { name = "Ibrahim Furkan Gulcan", email = "ibrahimfurkangulcan@gmail.com" },
]
requires-python = ">=3.12"
dependencies = [
    "inclave-core",
    "inclave-ollama",
    "inclave-sandbox",
    "typer>=0.12.0",
    "rich>=13.7.0",
    "pypdf>=4.0",
    "openpyxl>=3.1",
    "prompt-toolkit>=3.0",
]

[project.scripts]
inclave = "inclave_cli.main:app"

[tool.uv.sources]
inclave-core = { workspace = true }
inclave-ollama = { workspace = true }
inclave-sandbox = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-cov>=5.0.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/inclave_cli"]

[tool.mypy]
packages = ["inclave_cli"]
mypy_path = "src"

[[tool.mypy.overrides]]
module = "inclave_core.*"
ignore_missing_imports = true