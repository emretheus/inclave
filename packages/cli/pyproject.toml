[project]
name = "enclave-cli"
version = "0.1.0"
description = "Enclave Code CLI — entrypoint, REPL, file ingestion, command routing"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "enclave-core",
    "enclave-ollama",
    "enclave-sandbox",
    "typer>=0.12.0",
    "rich>=13.7.0",
    "pypdf>=4.0",
    "openpyxl>=3.1",
    "prompt-toolkit>=3.0",
]

[project.scripts]
enclave = "enclave_cli.main:app"

[tool.uv.sources]
enclave-core = { workspace = true }
enclave-ollama = { workspace = true }
enclave-sandbox = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-cov>=5.0.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/enclave_cli"]

[tool.mypy]
packages = ["enclave_cli"]
mypy_path = "src"

[[tool.mypy.overrides]]
module = "enclave_core.*"
ignore_missing_imports = true