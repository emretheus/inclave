[project]
name = "enclave-code"
version = "0.0.0"
description = "Local-first, privacy-preserving CLI for macOS — sandbox + Ollama + file work"
requires-python = ">=3.12"

[tool.uv]
package = false

[tool.uv.workspace]
members = ["packages/*", "shared/*"]

[tool.uv.sources]
enclave-core = { workspace = true }
enclave-sandbox = { workspace = true }

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
    "ruff>=0.5",
    "mypy>=1.10",
]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "B", "UP", "RUF"]

[tool.ruff.format]
quote-style = "double"

[tool.mypy]
python_version = "3.12"
strict = true
warn_unused_ignores = true

[tool.pytest.ini_options]
testpaths = ["packages", "shared", "tests"]
addopts = "-ra"
markers = [
    "integration: requires external services (Ollama running, etc.) — opt-in",
]

[tool.coverage.run]
source = ["packages", "shared"]
omit = ["*/tests/*"]

[tool.coverage.report]
show_missing = true
skip_covered = false
