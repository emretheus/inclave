name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Lint, type-check, test
    runs-on: macos-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install Python 3.12
        run: uv python install 3.12

      - name: Sync workspace
        run: uv sync --all-packages --all-extras

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Format check (ruff)
        run: uv run ruff format --check .

      - name: Type check (mypy)
        run: uv run mypy packages shared

      # Coverage gate. Bump as packages mature — PROJECT_PLAN §7 targets
      # ≥80% general / ≥90% for sandbox.
      - name: Test (pytest + coverage)
        env:
          COV_MIN: "75"
        run: uv run pytest --cov --cov-report=term-missing --cov-fail-under="$COV_MIN"

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            .coverage
            coverage.xml
          if-no-files-found: ignore

  # Privacy / hygiene checks. These have to be cheap, deterministic, and
  # enforce the things the README promises: no secrets, no outbound HTTP
  # to anything other than localhost.
  guard:
    name: Repo guard
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4

      - name: No secrets in tracked files
        run: |
          if git grep -nE '(BEGIN (RSA|OPENSSH) PRIVATE KEY|sk-[A-Za-z0-9]{20,})' -- . ':!*.md' ':!.github/**'; then
            echo "::error::Possible secret committed."
            exit 1
          fi

      - name: No non-localhost URLs in production code
        # The README's privacy promise hinges on this: nothing in packages/
        # or shared/ should reference a network host other than the local
        # Ollama daemon. We grep for http(s) URLs and fail on any that
        # isn't 127.0.0.1 / localhost. Tests are exempt (they mock).
        run: |
          set -e
          hits=$(grep -rEho 'https?://[A-Za-z0-9._-]+(:[0-9]+)?' \
                  packages shared \
                  --include='*.py' \
                  --exclude-dir=tests \
                  --exclude-dir=__pycache__ \
              | sort -u || true)
          bad=$(echo "$hits" | grep -vE '^https?://(127\.0\.0\.1|localhost)(:[0-9]+)?$' || true)
          if [ -n "$bad" ]; then
            echo "::error::Non-localhost URL referenced in production code:"
            echo "$bad"
            exit 1
          fi
          echo "all URLs in production code point at localhost — ok"
