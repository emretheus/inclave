name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Lint, type-check, test
    runs-on: macos-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      # Bootstrap guard: until root pyproject.toml lands (M0), keep CI green so
      # foundational PRs are not blocked. Once it exists, every step below runs.
      - name: Detect project
        id: detect
        run: |
          if [ -f pyproject.toml ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No root pyproject.toml yet — bootstrap phase. Skipping lint/test."
          fi

      - name: Install uv
        if: steps.detect.outputs.ready == 'true'
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install Python 3.12
        if: steps.detect.outputs.ready == 'true'
        run: uv python install 3.12

      - name: Sync workspace
        if: steps.detect.outputs.ready == 'true'
        run: uv sync --all-packages --all-extras

      - name: Lint (ruff)
        if: steps.detect.outputs.ready == 'true'
        run: uv run ruff check .

      - name: Format check (ruff)
        if: steps.detect.outputs.ready == 'true'
        run: uv run ruff format --check .

      - name: Type check (mypy)
        if: steps.detect.outputs.ready == 'true'
        run: uv run mypy packages shared

      # Coverage threshold ratchets up as packages mature.
      # Per PROJECT_PLAN §7: ≥80% general, ≥90% for sandbox.
      # Starts at 0 during M0; bump in PROJECT_PLAN PRs as code lands.
      - name: Test (pytest + coverage)
        if: steps.detect.outputs.ready == 'true'
        env:
          COV_MIN: "0"
        run: uv run pytest --cov --cov-report=term-missing --cov-fail-under="$COV_MIN"

      - name: Upload coverage report
        if: steps.detect.outputs.ready == 'true' && always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            .coverage
            coverage.xml
          if-no-files-found: ignore

  # Lightweight always-on check so PRs always have a status to gate on,
  # even during bootstrap when the test job is a no-op.
  guard:
    name: Repo guard
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
      - name: No secrets in tracked files
        run: |
          if git grep -nE '(BEGIN (RSA|OPENSSH) PRIVATE KEY|sk-[A-Za-z0-9]{20,})' -- . ':!*.md' ':!.github/**'; then
            echo "::error::Possible secret committed."
            exit 1
          fi
