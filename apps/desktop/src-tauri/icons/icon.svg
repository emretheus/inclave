<?xml version="1.0" encoding="UTF-8"?>
<!--
  InClave logo (master). Concept: an inward arrow (data/files enter) held inside
  a rounded enclosure (the on-device enclave). One accent color, no gradient.
  Palette: ink #0F0F14 ground, white frame, indigo #6C63FF arrow.
-->
<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="squircle"><rect x="64" y="64" width="896" height="896" rx="200"/></clipPath>
  </defs>
  <g clip-path="url(#squircle)">
    <rect width="1024" height="1024" fill="#0F0F14"/>
    <rect x="402" y="300" width="322" height="424" rx="118" fill="none" stroke="#FFFFFF" stroke-width="58"/>
    <path d="M250 512 L364 436 V588 Z" fill="#6C63FF"/>
  </g>
</svg>
